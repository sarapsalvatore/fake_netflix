<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naše Filmy</title>
    <style>
      /* --- ZÁKLADNÉ NASTAVENIA --- */
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: #141414;
        color: #fff;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        overflow: hidden; /* Zamedzí preblikávaniu lišt počas intra */
      }

      /* --- 1. INTRO OBRAZOVKA (OKAMŽITÉ ZMIZNUTIE) --- */
      #intro-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #intro-video {
        display: none;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .play-intro-btn {
        padding: 15px 35px;
        background-color: transparent;
        color: #e50914;
        border: 2px solid #e50914;
        font-size: 1.3rem;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* --- 2. WHO'S WATCHING OBRAZOVKA --- */
      #profiles-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #141414;
        z-index: 9998;
        display: none; /* Zapne sa bleskovo v JS */
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .profiles-title {
        font-size: 3.5rem;
        color: #fff;
        font-weight: 500;
        margin-bottom: 30px;
        letter-spacing: 1px;
      }

      .profile-list {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        margin-bottom: 50px;
      }

      .profile-card-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
      }

      /* DOKONALE GUĽATÝ TVAR BEZ DEFORMÁCIE */
      .profile-avatar {
        width: 150px;
        height: 150px;
        border-radius: 50% !important; /* Vynútená guľa */
        border: 3px solid transparent;
        transition:
          border-color 0.2s ease,
          transform 0.2s ease;
        object-fit: cover;
        background-color: #2b93ce;
      }

      .profile-card-wrapper:hover .profile-avatar {
        border-color: #fff;
        transform: scale(1.05);
      }

      .profile-name {
        margin-top: 15px;
        font-size: 1.3rem;
        color: #808080;
      }

      /* --- 3. HLAVNÝ NETFLIX WEB --- */
      header {
        padding: 20px 50px;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.7) 0%,
          rgba(0, 0, 0, 0) 100%
        );
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 10;
        box-sizing: border-box;
      }

      .logo {
        color: #e50914;
        font-size: 30px;
        font-weight: bold;
        text-transform: uppercase;
      }

      .hero {
        height: 75vh;
        background:
          linear-gradient(
            to top,
            #141414 0%,
            rgba(0, 0, 0, 0.1) 60%,
            rgba(0, 0, 0, 0.5) 100%
          ),
          url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1925")
            no-repeat center center/cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 50px;
        box-sizing: border-box;
      }

      .hero-title {
        font-size: 4.5rem;
        margin: 0 0 15px 0;
        font-weight: bold;
      }
      .hero-desc {
        font-size: 1.3rem;
        max-width: 650px;
        margin-bottom: 25px;
        color: #e5e5e5;
      }
      .btn-netflix {
        padding: 12px 30px;
        font-size: 1.1rem;
        font-weight: bold;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background-color: #fff;
        color: #000;
      }

      .main-container {
        padding: 50px;
        margin-top: -60px;
        position: relative;
        z-index: 5;
      }
      .row-title {
        font-size: 1.6rem;
        font-weight: bold;
        margin-bottom: 15px;
      }
      .movies-row {
        display: flex;
        gap: 15px;
      }

      .movie-card {
        min-width: 280px;
        height: 158px;
        background-color: #333;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: flex-end;
        padding: 15px;
        box-sizing: border-box;
        background-size: cover;
        background-position: center;
      }

      /* --- 4. MODAL PREHRÁVAČ --- */
      .video-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background-color: #181818;
        width: 100%;
        max-width: 750px;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
      }

      .modal-video-box {
        position: relative;
        width: 100%;
        height: 350px;
        display: flex;
        align-items: flex-end;
        padding: 30px;
        box-sizing: border-box;
      }

      #mainVideoPlayer {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        background-color: #000;
      }

      .modal-close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 36px;
        height: 36px;
        background-color: #181818;
        border-radius: 50%;
        color: #fff;
        font-size: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="intro-container">
      <button class="play-intro-btn" id="start-btn" onclick="startEverything()">
        Start watching
      </button>
      <video id="intro-video" src="intro.mp4" playsinline></video>
    </div>

    <div id="profiles-container">
      <div class="profiles-title">Who's Watching?</div>
      <div class="profile-list">
        <div class="profile-card-wrapper" onclick="selectProfile()">
          <img src="profilovka.jpg" alt="Profile" class="profile-avatar" />
          <div class="profile-name">Love</div>
        </div>
      </div>
    </div>

    <header>
      <div class="logo">NETFLIX</div>
    </header>

    <div class="hero">
      <div class="hero-title">Naše Spoločné Zážitky</div>
      <div class="hero-desc">
        Sleduj tie najlepšie momenty, ktoré sme spolu zažili.
      </div>
      <button
        class="btn-netflix"
        onclick="
          openModal(
            'Naše Spoločné Zážitky',
            'video1.mp4',
            'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=750',
          )
        "
      >
        ▶ Play
      </button>
    </div>

    <div class="main-container">
      <div class="row-title">Najpopulárnejšie u vás</div>
      <div class="movies-row">
        <div
          class="movie-card"
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=500&quot;);
          "
          onclick="
            openModal(
              'Film 1: Výlet do mesta',
              'video1.mp4',
              'https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=750',
            )
          "
        >
          <h3>Film 1: Výlet do mesta</h3>
        </div>
      </div>
    </div>

    <div class="video-modal" id="netflixModal">
      <div class="modal-content">
        <div class="modal-close-btn" onclick="closeModal()">&times;</div>
        <div class="modal-video-box" id="modalBanner">
          <video id="mainVideoPlayer" controls></video>
          <div style="position: relative; z-index: 3" id="modalHeaderText">
            <h2 style="font-size: 2rem; margin-bottom: 10px" id="modalTitle">
              Názov
            </h2>
            <button class="btn-netflix" id="modalPlayBtn">▶ Play Now</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      var currentVideoSrc = "";
      var done = false;

      function startEverything() {
        var btn = document.getElementById("start-btn");
        var introVideo = document.getElementById("intro-video");

        btn.style.display = "none";
        introVideo.style.display = "block";
        introVideo.play();

        // Akonáhle video DOSTRSTRIHÁ, okamžite bez animácie prepni obrazovku
        introVideo.onended = function () {
          switchToProfiles();
        };

        // Tvrdá poistka na 4.1 sekundy, ak by video seklo
        setTimeout(function () {
          switchToProfiles();
        }, 4100);
      }

      // BLESKOVÝ PRECHOD BEZ ČAKANIA A PREBLIKÁVANIA
      function switchToProfiles() {
        if (done) return;
        done = true;

        // Úplne vymažeme intro kontajner a natvrdo zapneme profily
        document.getElementById("intro-container").style.display = "none";
        document.getElementById("profiles-container").style.display = "flex";
        document.body.style.overflow = "auto"; // Povolíme skrolovanie na webe
      }

      function selectProfile() {
        document.getElementById("profiles-container").style.display = "none";
      }

      function openModal(title, videoSrc, bgImage) {
        var modal = document.getElementById("netflixModal");
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalBanner").style.backgroundImage =
          "url('" + bgImage + "')";
        currentVideoSrc = videoSrc;
        modal.style.display = "flex";

        document.getElementById("modalPlayBtn").onclick = function () {
          var player = document.getElementById("mainVideoPlayer");
          document.getElementById("modalHeaderText").style.display = "none";
          player.style.display = "block";
          player.src = currentVideoSrc;
          player.play();
        };
      }

      function closeModal() {
        document.getElementById("netflixModal").style.display = "none";
        document.getElementById("mainVideoPlayer").pause();
      }
    </script>
  </body>
</html>

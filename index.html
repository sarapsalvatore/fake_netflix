<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naše Filmy</title>
    <style>
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: #141414;
        color: #fff;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      /* --- VIDEO INTRO OVERLAY --- */
      #intro-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.8s ease-out;
      }

      #intro-video {
        display: none;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .play-intro-btn {
        padding: 15px 35px;
        background-color: transparent;
        color: #e50914;
        border: 2px solid #e50914;
        font-size: 1.3rem;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: all 0.3s ease;
        box-shadow: 0 0 15px rgba(229, 9, 20, 0.2);
      }

      .play-intro-btn:hover {
        background-color: #e50914;
        color: white;
        box-shadow: 0 0 25px rgba(229, 9, 20, 0.6);
        transform: scale(1.05);
      }

      /* --- HLAVNÝ WEB --- */
      header {
        padding: 20px 50px;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.7) 0%,
          rgba(0, 0, 0, 0) 100%
        );
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 10;
        box-sizing: border-box;
      }

      .logo {
        color: #e50914;
        font-size: 30px;
        font-weight: bold;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .hero {
        height: 70vh;
        background:
          linear-gradient(
            to top,
            #141414 0%,
            rgba(0, 0, 0, 0.2) 60%,
            rgba(0, 0, 0, 0.6) 100%
          ),
          url("https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925&auto=format&fit=crop")
            no-repeat center center/cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 50px;
        box-sizing: border-box;
      }

      .hero-title {
        font-size: 3.5rem;
        margin-bottom: 10px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }

      .hero-desc {
        font-size: 1.2rem;
        max-width: 600px;
        margin-bottom: 20px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      }

      .main-container {
        padding: 0 50px 50px 50px;
        margin-top: -50px;
        position: relative;
        z-index: 5;
      }

      .row-title {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 15px;
      }

      .movies-row {
        display: flex;
        gap: 15px;
        overflow-x: auto;
        padding-bottom: 20px;
      }

      .movies-row::-webkit-scrollbar {
        display: none;
      }

      .movie-card {
        min-width: 240px;
        height: 135px;
        background-color: #333;
        border-radius: 4px;
        cursor: pointer;
        transition: transform 0.3s ease;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: flex-end;
        padding: 10px;
        box-sizing: border-box;
        background-size: cover;
        background-position: center;
      }

      .movie-card:hover {
        transform: scale(1.08);
        z-index: 2;
      }

      .movie-card h3 {
        margin: 0;
        font-size: 1rem;
        text-shadow: 2px 2px 4px #000;
      }

      /* Video Prehrávač */
      .video-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.95);
        z-index: 100;
        justify-content: center;
        align-items: center;
      }

      .video-modal video {
        width: 80%;
        max-width: 900px;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
      }

      .close-btn {
        position: absolute;
        top: 30px;
        right: 50px;
        font-size: 40px;
        color: white;
        cursor: pointer;
        font-weight: bold;
      }

      .close-btn:hover {
        color: #e50914;
      }
    </style>
  </head>
  <body>
    <div id="intro-container">
      <button class="play-intro-btn" id="start-btn" onclick="startEverything()">
        Start watching
      </button>
      <video id="intro-video" src="intro.mp4" playsinline></video>
    </div>

    <header>
      <div class="logo">NETFLIX</div>
    </header>

    <div class="hero">
      <div class="hero-title">Naše Spoločné Zážitky</div>
      <div class="hero-desc">
        Sleduj tie najlepšie, najvtipnejšie a najbláznivejšie momenty, ktoré sme
        spolu zažili.
      </div>
    </div>

    <div class="main-container">
      <div class="row-title">Najpopulárnejšie u vás</div>

      <div class="movies-row">
        <div
          class="movie-card"
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=500&quot;);
          "
          onclick="playVideo('video1.mp4')"
        >
          <h3>Film 1: Výlet do mesta</h3>
        </div>

        <div
          class="movie-card"
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1524178232363-1fb2b075b655?q=80&w=500&quot;);
          "
          onclick="playVideo('video2.mp4')"
        >
          <h3>Film 2: Zo školy</h3>
        </div>

        <div
          class="movie-card"
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=500&quot;);
          "
          onclick="playVideo('video3.mp4')"
        >
          <h3>Film 3: Letná párty</h3>
        </div>

        <div
          class="movie-card"
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=500&quot;);
          "
          onclick="playVideo('video4.mp4')"
        >
          <h3>Film 4: Vlog zo záhrady</h3>
        </div>
      </div>
    </div>

    <div class="video-modal" id="videoModal">
      <span class="close-btn" onclick="closeVideo()">&times;</span>
      <video id="videoPlayer" controls></video>
    </div>

    <script>
      function hideIntro() {
        var introContainer = document.getElementById("intro-container");
        introContainer.style.opacity = "0";
        setTimeout(function () {
          introContainer.style.display = "none";
        }, 800);
      }

      function startEverything() {
        var btn = document.getElementById("start-btn");
        var introVideo = document.getElementById("intro-video");

        btn.style.display = "none";
        introVideo.style.display = "block";

        // Spustenie videa, ktoré má v sebe originálny zvuk z YouTube
        introVideo.play().catch(function (error) {
          console.log("Prehrávanie zlyhalo:", error);
        });

        // Ak video dohrá celé, vypni ho
        introVideo.onended = function () {
          hideIntro();
        };

        // Poistka: Po 4.2 sekundách ťa to pustí ďalej, ak by video seklo
        setTimeout(function () {
          hideIntro();
        }, 4200);
      }

      // Funkcie pre filmy
      function playVideo(videoSource) {
        var modal = document.getElementById("videoModal");
        var player = document.getElementById("videoPlayer");

        player.src = videoSource;
        modal.style.display = "flex";
        player.play();
      }

      function closeVideo() {
        var modal = document.getElementById("videoModal");
        var player = document.getElementById("videoPlayer");

        modal.style.display = "none";
        player.pause();
        player.src = "";
      }
    </script>
  </body>
</html>

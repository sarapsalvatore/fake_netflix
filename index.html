<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naše Filmy</title>
    <style>
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: #141414;
        color: #fff;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      /* --- 1. INTRO OBRAZOVKA --- */
      #intro-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.4s ease-out;
      }

      #intro-video {
        display: none;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .play-intro-btn {
        padding: 15px 35px;
        background-color: transparent;
        color: #e50914;
        border: 2px solid #e50914;
        font-size: 1.3rem;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: all 0.3s ease;
      }

      .play-intro-btn:hover {
        background-color: #e50914;
        color: white;
        transform: scale(1.05);
      }

      /* --- 2. WHO'S WATCHING OBRAZOVKA --- */
      #profiles-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #141414;
        z-index: 9998;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .profiles-title {
        font-size: 3.5rem;
        color: #fff;
        font-weight: 500;
        margin-bottom: 30px;
        letter-spacing: 1px;
      }

      .profile-list {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        margin-bottom: 50px;
      }

      .profile-card-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
      }

      .profile-avatar {
        width: 150px;
        height: 150px;
        border-radius: 4px;
        border: 3px solid transparent;
        transition:
          border-color 0.2s ease,
          transform 0.2s ease;

        /* Načítanie tvojho súboru profilovka.jpg z priečinka */
        background-image: url("profilovka.jpg");
        background-size: cover;
        background-position: center;
        background-color: #2b93ce; /* Pekná modrá ako záloha, ak by sa fotka nenačítala */
      }

      .profile-card-wrapper:hover .profile-avatar {
        border-color: #fff;
        transform: scale(1.05);
      }

      .profile-name {
        margin-top: 15px;
        font-size: 1.3rem;
        color: #808080;
        transition: color 0.2s ease;
      }

      .profile-card-wrapper:hover .profile-name {
        color: #fff;
      }

      .manage-profiles-btn {
        background-color: transparent;
        border: 1px solid #808080;
        color: #808080;
        text-transform: uppercase;
        padding: 10px 30px;
        font-size: 1.1rem;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .manage-profiles-btn:hover {
        border-color: #fff;
        color: #fff;
      }

      /* --- 3. HLAVNÝ WEB --- */
      header {
        padding: 20px 50px;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.7) 0%,
          rgba(0, 0, 0, 0) 100%
        );
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 10;
        box-sizing: border-box;
      }

      .logo {
        color: #e50914;
        font-size: 30px;
        font-weight: bold;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .hero {
        height: 75vh;
        background:
          linear-gradient(
            to top,
            #141414 0%,
            rgba(0, 0, 0, 0.1) 60%,
            rgba(0, 0, 0, 0.5) 100%
          ),
          url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1925")
            no-repeat center center/cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 50px;
        box-sizing: border-box;
      }

      .hero-badge {
        font-size: 0.9rem;
        font-weight: bold;
        letter-spacing: 4px;
        color: #aaa;
        margin-bottom: 5px;
        text-transform: uppercase;
      }

      .hero-title {
        font-size: 4.5rem;
        margin: 0 0 15px 0;
        font-weight: bold;
      }

      .hero-desc {
        font-size: 1.3rem;
        max-width: 650px;
        margin-bottom: 25px;
        color: #e5e5e5;
      }

      .hero-btns {
        display: flex;
        gap: 15px;
      }

      .btn-netflix {
        padding: 12px 30px;
        font-size: 1.1rem;
        font-weight: bold;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: opacity 0.2s;
      }

      .btn-play {
        background-color: #fff;
        color: #000;
      }
      .btn-info {
        background-color: rgba(109, 109, 110, 0.7);
        color: #fff;
      }
      .btn-netflix:hover {
        opacity: 0.85;
      }

      .main-container {
        padding: 0 50px 50px 50px;
        margin-top: -60px;
        position: relative;
        z-index: 5;
      }

      .row-title {
        font-size: 1.6rem;
        font-weight: bold;
        margin-bottom: 15px;
      }

      .movies-row {
        display: flex;
        gap: 15px;
        overflow-x: auto;
        padding-bottom: 20px;
      }

      .movies-row::-webkit-scrollbar {
        display: none;
      }

      .movie-card {
        min-width: 280px;
        height: 158px;
        background-color: #333;
        border-radius: 4px;
        cursor: pointer;
        transition: transform 0.3s ease;
        display: flex;
        align-items: flex-end;
        padding: 15px;
        box-sizing: border-box;
        background-size: cover;
        background-position: center;
      }

      .movie-card:hover {
        transform: scale(1.1);
      }

      .movie-card h3 {
        margin: 0;
        font-size: 1.1rem;
        text-shadow: 1px 1px 3px #000;
      }

      /* --- 4. NETFLIX MODAL PREHRÁVAČ --- */
      .video-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background-color: #181818;
        width: 100%;
        max-width: 750px;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
      }

      .modal-video-box {
        position: relative;
        width: 100%;
        height: 350px;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: flex-end;
        padding: 30px;
        box-sizing: border-box;
      }

      #mainVideoPlayer {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        background-color: #000;
      }

      .modal-close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 36px;
        height: 36px;
        background-color: #181818;
        border-radius: 50%;
        color: #fff;
        font-size: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="intro-container">
      <button class="play-intro-btn" id="start-btn" onclick="startEverything()">
        Start watching
      </button>
      <video id="intro-video" src="intro.mp4" playsinline></video>
    </div>

    <div id="profiles-container">
      <div class="profiles-title">Who's Watching?</div>
      <div class="profile-list">
        <div class="profile-card-wrapper" onclick="selectProfile()">
          <div class="profile-avatar"></div>
          <div class="profile-name">Love</div>
        </div>
      </div>
      <button class="manage-profiles-btn">Manage Profiles</button>
    </div>

    <header>
      <div class="logo">NETFLIX</div>
    </header>

    <div class="hero">
      <div class="hero-badge">⭐ SOMETHING SPECIAL</div>
      <div class="hero-title">Naše Spoločné Zážitky</div>
      <div class="hero-desc">
        Sleduj tie najlepšie momenty, ktoré sme spolu zažili.
      </div>
      <div class="hero-btns">
        <button
          class="btn-netflix btn-play"
          onclick="
            openModal(
              'Naše Spoločné Zážitky',
              'video1.mp4',
              'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=750',
            )
          "
        >
          ▶ Play
        </button>
      </div>
    </div>

    <div class="main-container">
      <div class="row-title">Najpopulárnejšie u vás</div>
      <div class="movies-row">
        <div
          class="movie-card"
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=500&quot;);
          "
          onclick="
            openModal(
              'Film 1: Výlet do mesta',
              'video1.mp4',
              'https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=750',
            )
          "
        >
          <h3>Film 1: Výlet do mesta</h3>
        </div>
        <div
          class="movie-card"
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1524178232363-1fb2b075b655?q=80&w=500&quot;);
          "
          onclick="
            openModal(
              'Film 2: Zo školy',
              'video2.mp4',
              'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?q=80&w=750',
            )
          "
        >
          <h3>Film 2: Zo školy</h3>
        </div>
      </div>
    </div>

    <div class="video-modal" id="netflixModal">
      <div class="modal-content">
        <div class="modal-close-btn" onclick="closeModal()">&times;</div>
        <div class="modal-video-box" id="modalBanner">
          <video id="mainVideoPlayer" controls></video>
          <div style="position: relative; z-index: 3" id="modalHeaderText">
            <h2 style="font-size: 2rem; margin-bottom: 10px" id="modalTitle">
              Názov
            </h2>
            <button class="btn-netflix btn-play" id="modalPlayBtn">
              ▶ Play Now
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      var currentVideoSrc = "";

      function startEverything() {
        var btn = document.getElementById("start-btn");
        var introVideo = document.getElementById("intro-video");

        btn.style.display = "none";
        introVideo.style.display = "block";

        introVideo.play().catch(function (e) {
          console.log("Prehrávanie zlyhalo:", e);
        });

        introVideo.onended = function () {
          showProfilesScreen();
        };

        // Časová poistka na 4.3 sekundy
        setTimeout(function () {
          showProfilesScreen();
        }, 4300);
      }

      function showProfilesScreen() {
        var introContainer = document.getElementById("intro-container");
        var profilesContainer = document.getElementById("profiles-container");

        introContainer.style.display = "none";
        profilesContainer.style.display = "flex";

        setTimeout(function () {
          profilesContainer.style.opacity = "1";
        }, 50);
      }

      function selectProfile() {
        var profilesContainer = document.getElementById("profiles-container");
        profilesContainer.style.opacity = "0";

        setTimeout(function () {
          profilesContainer.style.display = "none";
        }, 400);
      }

      function openModal(title, videoSrc, bgImage) {
        var modal = document.getElementById("netflixModal");
        var banner = document.getElementById("modalBanner");

        document.getElementById("modalTitle").innerText = title;
        banner.style.backgroundImage = "url('" + bgImage + "')";
        currentVideoSrc = videoSrc;

        document.getElementById("mainVideoPlayer").style.display = "none";
        document.getElementById("mainVideoPlayer").src = "";
        document.getElementById("modalHeaderText").style.display = "block";
        modal.style.display = "flex";

        document.getElementById("modalPlayBtn").onclick = function () {
          var player = document.getElementById("mainVideoPlayer");
          document.getElementById("modalHeaderText").style.display = "none";
          player.style.display = "block";
          player.src = currentVideoSrc;
          player.play();
        };
      }

      function closeModal() {
        document.getElementById("netflixModal").style.display = "none";
        document.getElementById("mainVideoPlayer").pause();
      }
    </script>
  </body>
</html>
